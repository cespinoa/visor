      css/dashboard/siluetas-variantes.css: {weight: 25}
      css/dashboard/siluetas.css: {weight: 30}
      css/dashboard/controls.css: {weight: 30}
      css/dashboard/components.css: {weight: 30}
      css/dashboard/graficos.css:  {weight: 30}
      
  js:
    https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js: { type: external, minified: true }
    https://cdnjs.cloudflare.com/ajax/libs/gauge.js/1.3.7/gauge.min.js: { type: external, minified: true }
    https://unpkg.com/simple-statistics@7.8.3/dist/simple-statistics.min.js: { type: external, minified: true }
    js/dashboard/namespace.js: { weight: -100 }
    js/dashboard/utils.js: { weight: -95 }
    js/dashboard/config-colores.js: { weight: -95 }
    js/dashboard/config-tablas.js: { weight: -90 }
    js/dashboard/config-graficos.js: { weight: -90 }
    js/dashboard/config-widgets.js: { weight: -90 }
    js/dashboard/utils-layout.js: { weight: -85 }
    js/dashboard/utils-tablas.js: { weight: -80 }
    js/dashboard/utils-graficos.js: { weight: -80 }
    js/dashboard/utils-imagenes.js: { weight: -80 }
    js/dashboard/utils-widgets.js: { weight: -80 }
    js/dashboard/data-selector.js: { weight: -80 }
    js/dashboard/row-compositor.js: { weight: -75 }
    js/dashboard/panel-datos.js: { weight: -70 }
    js/dashboard/panel-graficos.js: { weight: -70 }
    js/dashboard/panel-dashboard.js: { weight: -70 }
    js/dashboard/panel-informe.js: { weight: -70 }
    js/dashboard/panel-mapa.js: { weight: -65 }
    js/dashboard/tabs.js: { weight: -60 }
    js/dashboard/social-manager.js: { weight: -55 }
    js/dashboard/vistas-manager.js: { weight: -55 }
