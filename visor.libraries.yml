visor_dashboard:
  version: 1.x
  css:
    theme:
      https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css: { type: external, minified: true }
      css/main.css: {weight: 20}
      css/siluetas-variantes.css: {weight: 25}
      css/siluetas.css: {weight: 30}
      css/controls.css: {weight: 30}
      css/components.css: {weight: 30}
      css/graficos.css:  {weight: 30}
      
  js:
    https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js: { type: external, minified: true }
    https://cdnjs.cloudflare.com/ajax/libs/gauge.js/1.3.7/gauge.min.js: { type: external, minified: true }
    https://unpkg.com/simple-statistics@7.8.3/dist/simple-statistics.min.js: { type: external, minified: true }
    js/namespace.js: { weight: -100 }
    js/utils.js: { weight: -95 }
    js/config-colores.js: { weight: -95 }
    js/config-tablas.js: { weight: -90 }
    js/config-graficos.js: { weight: -90 }
    js/config-widgets.js: { weight: -90 }
    js/utils-layout.js: { weight: -85 }
    js/utils-tablas.js: { weight: -80 }
    js/utils-graficos.js: { weight: -80 }
    js/utils-imagenes.js: { weight: -80 }
    js/utils-widgets.js: { weight: -80 }
    js/data-selector.js: { weight: -80 }
    js/row-compositor.js: { weight: -75 }
    js/panel-datos.js: { weight: -70 }
    js/panel-graficos.js: { weight: -70 }
    js/panel-dashboard.js: { weight: -70 }
    js/panel-informe.js: { weight: -70 }
    js/panel-mapa.js: { weight: -65 }
    js/tabs.js: { weight: -60 }
    js/social-manager.js: { weight: -55 }
    js/vistas-manager.js: { weight: -55 }
    js/main.js: { weight: 0 } # <--- Último, ya conoce a todos

  dependencies:
    - core/jquery
    - core/drupal
    - core/drupalSettings
    - core/once
    - visor/chartjs_core
    - visor/luxon_core
    - visor/chartjs_adapter_luxon
    - visor/gaugejs

visor_informe_nodo:
  version: 1.x
  js:
    js/informe-nodo.js: {}
  dependencies:
    - core/jquery
    - core/drupal

chartjs_core:
  remote: https://github.com/chartjs/Chart.js
  version: 4.4.1
  license:
    name: MIT
    url: https://github.com/chartjs/Chart.js/blob/master/LICENSE.md
    gpl-compatible: true
  js:
    https://cdn.jsdelivr.net/npm/chart.js: { type: external, minified: true }

luxon_core:
  remote: https://github.com/moment/luxon
  license:
    name: MIT
    url: https://github.com/moment/luxon/blob/master/LICENSE.md
    gpl-compatible: true
  js:
    https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js: { type: external, minified: true }

chartjs_adapter_luxon:
  remote: https://github.com/chartjs/chartjs-adapter-luxon
  license:
    name: MIT
    url: https://github.com/chartjs/chartjs-adapter-luxon/blob/master/LICENSE.md
    gpl-compatible: true
  js:
    https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js: { type: external, minified: true }

gaugejs:
  remote: https://github.com/bernii/gauge.js
  version: 1.3.7
  license:
    name: MIT
    url: https://github.com/bernii/gauge.js/blob/master/LICENSE.txt
    gpl-compatible: true
  js:
    https://bernii.github.io/gauge.js/dist/gauge.min.js: { type: external, minified: true }
