dashboard:
  js:
    js/visor/dashboard.js: {}
    
chartjs_core:
  remote: https://github.com/chartjs/Chart.js
  version: 4.4.1
  license:
    name: MIT
    url: https://github.com/chartjs/Chart.js/blob/master/LICENSE.md
    gpl-compatible: true
  js:
    https://cdn.jsdelivr.net/npm/chart.js: { type: external, minified: true }

luxon_core:
  remote: https://github.com/moment/luxon
  license:
    name: MIT
    url: https://github.com/moment/luxon/blob/master/LICENSE.md
    gpl-compatible: true
  js:
    https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js: { type: external, minified: true }

chartjs_adapter_luxon:
  remote: https://github.com/chartjs/chartjs-adapter-luxon
  license:
    name: MIT
    url: https://github.com/chartjs/chartjs-adapter-luxon/blob/master/LICENSE.md
    gpl-compatible: true
  js:
    https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js: { type: external, minified: true }

gaugejs:
  remote: https://github.com/bernii/gauge.js
  version: 1.3.7
  license:
    name: MIT
    url: https://github.com/bernii/gauge.js/blob/master/LICENSE.txt
    gpl-compatible: true
  js:
    https://bernii.github.io/gauge.js/dist/gauge.min.js: { type: external, minified: true }
