data_aggregator:
  id: single
  config:
    storage_clients:
      -
        id: sql
        config:
          queries:
            read:
              - 'SELECT id_campo, etiqueta, descripcion, tipo, orden_de_calculo, formula, origen, formato, unidades, visualizable, comparable, en_mv, en_localidades FROM diccionario_de_datos WHERE id_campo = :id'
            list:
              - 'SELECT id_campo, etiqueta, descripcion, tipo, orden_de_calculo, formula, origen, formato, unidades, visualizable, comparable, en_mv, en_localidades FROM diccionario_de_datos'
            count:
              - 'SELECT COUNT(*) FROM diccionario_de_datos'
          connection:
            dbkey: mapa_data
            schemas:
              - public
          placeholders: {  }
          filter_mappings:
            - alias: field_etiqueta
              expression: etiqueta
            - alias: field_descripcion
              expression: descripcion
            - alias: field_tipo
              expression: tipo
            - alias: field_orden_de_calculo
              expression: orden_de_calculo
            - alias: field_formula
              expression: formula
            - alias: field_origen
              expression: origen
            - alias: field_formato
              expression: formato
            - alias: field_unidades
              expression: unidades
            - alias: field_visualizable
              expression: visualizable
            - alias: field_comparable
              expression: comparable
            - alias: field_en_mv
              expression: en_mv
            - alias: field_en_localidades
              expression: en_localidades
