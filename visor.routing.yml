visor.dashboard:
  path: '/dashboard'
  defaults:
    _title: 'Dashboard'
    _controller: '\Drupal\visor\Controller\DashboardController::__invoke'
  requirements:
    _permission: 'access content'
visor.informe.guardar:
  path: '/api/visor/informe/guardar'
  defaults:
    _controller: '\Drupal\visor\Controller\InformeController::guardar'
    _title: 'Guardar informe'
  requirements:
    _permission: 'administer content'
  methods: [POST]

visor.informe.generar_pdf:
  path: '/api/visor/informe/{nid}/generar-pdf'
  defaults:
    _controller: '\Drupal\visor\Controller\InformeController::generarPdf'
    _title: 'Generar PDF'
  requirements:
    _permission: 'administer content'
    nid: \d+
  methods: [POST]

visor.texto.resolver:
  path: '/api/visor/texto/{id}'
  defaults:
    _controller: '\Drupal\visor\Controller\InformeController::resolverTexto'
    _title: 'Resolver bloque de texto'
  requirements:
    _permission: 'administer content'
  methods: [POST]
